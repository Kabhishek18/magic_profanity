name: Python Package using Conda

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  # This silences the Node.js deprecation warnings you're seeing
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: ${{ matrix.python-version }}
        activate-environment: magic-env
        # Updated from 'auto-activate-base' to 'auto-activate' to fix warning
        auto-activate: true 
        channels: conda-forge,defaults

    - name: Install dependencies
      shell: bash -el {0}
      run: |
        # Using conda-forge for faster/more reliable installs
        conda install -c conda-forge flake8 pytest
        
        # Install the package and its requirements
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .
        
        # Essential for magic_profanity's sentiment features
        python -c "import nltk; nltk.download('vader_lexicon'); nltk.download('punkt')"

    - name: Lint with flake8
      shell: bash -el {0}
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      shell: bash -el {0}
      run: |
        pytest
